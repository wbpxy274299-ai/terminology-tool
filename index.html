<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>游戏术语校对工具 — 模块化版</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="src/css/style.css">
  <script src="src/js/config.js"></script>
  <script src="src/js/utils.js"></script>
  <script src="src/js/data.js"></script>
  <script src="src/js/search.js"></script>
  <script src="src/js/check.js"></script>
  <script src="src/js/update.js"></script>
  <script src="src/js/app.js"></script>
</head>
<body>

<!-- 更新术语表弹窗 -->
<div class="modal-overlay" id="update-modal">
  <div class="modal">
    <h2>🔄 更新术语表</h2>
    <div class="subtitle">支持单语言更新或7种语言批量合并导入</div>
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="batch">📦 批量导入</button>
      <button class="mode-tab" data-mode="single">📝 单语言更新</button>
    </div>
    <div id="batch-mode">
      <div class="drop-zone" id="batch-drop-zone">
        <div class="icon">📁</div>
        <div class="text">拖拽多个 Excel 文件到这里，或点击选择</div>
        <div class="hint">同时拖入日/英/韩/繁中/越南/印尼/泰语 Excel，自动识别并合并</div>
        <input type="file" id="batch-file-input" accept=".xlsx,.xls" multiple>
      </div>
      <div class="file-list" id="batch-file-list"></div>
    </div>
    <div id="single-mode" style="display:none">
      <div id="update-lang-select" style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;">
        <button class="active" data-lang="jp" style="padding:6px 14px;border:2px solid #764ba2;background:#f0e6ff;border-radius:8px;cursor:pointer;font-size:13px;color:#764ba2;font-weight:600;">🇯🇵 日语</button>
        <button data-lang="en" style="padding:6px 14px;border:2px solid #e0e0e0;background:#fff;border-radius:8px;cursor:pointer;font-size:13px;">🇬🇧 英语</button>
        <button data-lang="kr" style="padding:6px 14px;border:2px solid #e0e0e0;background:#fff;border-radius:8px;cursor:pointer;font-size:13px;">🇰🇷 韩语</button>
        <button data-lang="tw" style="padding:6px 14px;border:2px solid #e0e0e0;background:#fff;border-radius:8px;cursor:pointer;font-size:13px;">🇹🇼 繁中</button>
        <button data-lang="vn" style="padding:6px 14px;border:2px solid #e0e0e0;background:#fff;border-radius:8px;cursor:pointer;font-size:13px;">🇻🇳 越南语</button>
        <button data-lang="id" style="padding:6px 14px;border:2px solid #e0e0e0;background:#fff;border-radius:8px;cursor:pointer;font-size:13px;">🇮🇩 印尼语</button>
        <button data-lang="th" style="padding:6px 14px;border:2px solid #e0e0e0;background:#fff;border-radius:8px;cursor:pointer;font-size:13px;">🇹🇭 泰语</button>
      </div>
      <div class="drop-zone" id="update-drop-zone">
        <div class="icon">📁</div>
        <div class="text">拖拽 Excel 文件到这里，或点击选择</div>
        <input type="file" id="update-file-input" accept=".xlsx,.xls">
      </div>
    </div>
    <div class="status" id="update-status"></div>
    <div class="stats" id="update-stats"></div>
    <div class="actions">
      <button class="btn btn-secondary" onclick="closeUpdateModal()">取消</button>
      <button class="btn btn-primary" id="update-download-btn" style="display:none" onclick="downloadUpdatedJSON()">💾 下载更新后的 JSON</button>
    </div>
  </div>
</div>

<!-- 主界面 -->
<div class="container">
  <h1>
    📖 游戏术语校对工具
    <span class="ver">模块化版</span>
    <button class="update-btn" onclick="openUpdateModal()">🔄 更新术语表</button>
  </h1>

  <!-- 加载状态 -->
  <div id="loading">
    <div class="spinner"></div>
    <div class="progress">正在加载术语数据...</div>
  </div>

  <!-- 主应用 -->
  <div id="app" style="display:none">
    <div class="card">
      <!-- Tab 切换 -->
      <div class="tabs">
        <button class="tab active" data-tab="search">🔍 搜索</button>
        <button class="tab" data-tab="check">📝 校对</button>
        <button class="tab" data-tab="batch">📦 批量校对</button>
      </div>

      <!-- 搜索面板 -->
      <div class="panel active" id="panel-search">
        <div class="search-box">
          <input type="text" id="search-input" placeholder="输入关键词搜索..." autocomplete="off">
          <button onclick="doSearch()">搜索</button>
        </div>
        <div class="count" id="search-count"></div>
        <div class="results" id="search-results"></div>
      </div>

      <!-- 校对面板 -->
      <div class="panel" id="panel-check">
        <div class="count" id="stats-bar"></div>
        <textarea class="check-input" id="check-input" placeholder="输入单词或粘贴整段文案，自动校对术语...
支持中文、日语、英语、韩语、繁中、越南语、泰语、印尼语"></textarea>
        <button class="check-btn" onclick="doCheck()">开始校对</button>
        <div class="check-result" id="check-result"></div>
      </div>

      <!-- 批量校对面板 -->
      <div class="panel" id="panel-batch">
        <div class="batch-upload" id="batch-upload" onclick="document.getElementById('batch-file').click()">
          <div class="icon">📁</div>
          <div>点击或拖拽上传文件</div>
          <div class="hint">支持 .txt / .json / .csv（每行一条文案）</div>
          <input type="file" id="batch-file" accept=".txt,.json,.csv">
        </div>
        <div id="batch-result"></div>
      </div>
    </div>
  </div>

  <div class="footer">多语言术语校对工具 · 支持7种语言 · 模块化架构 · 可批量导入</div>
</div>

</body>
</html>
